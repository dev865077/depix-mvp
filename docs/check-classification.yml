# Canonical source of truth for PR check classification.
# Required checks are allowed to block merge.
# Informative checks may warn, fail, or cancel without becoming merge blockers.
# GitHub renders the required CI job as "CI / Test" in the PR UI,
# but the effective required status-check context is "Test".

required:
  - Test

informative:
  - AI PR Review / discussion-review
  - AI Wiki Update / update-wiki
