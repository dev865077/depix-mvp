name: AI Wiki Update

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ai-wiki-update-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-wiki:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate wiki updates
        env:
          AI_WIKI_PROMPT_PATH: .github/prompts/ai-wiki-update.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_WIKI_UPDATE_MODEL: ${{ vars.OPENAI_WIKI_UPDATE_MODEL }}
        run: node scripts/ai-wiki-update.mjs

      - name: Commit docs/wiki changes
        id: commit_docs
        shell: bash
        run: |
          if git diff --quiet -- docs/wiki; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/wiki
          git commit -m "docs: update wiki after PR #${{ github.event.pull_request.number }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Detect GitHub Wiki availability
        if: steps.commit_docs.outputs.changed == 'true'
        id: wiki_meta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          response="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}")"
          has_wiki="$(node -e "const repo = JSON.parse(process.argv[1]); process.stdout.write(String(Boolean(repo.has_wiki)));" "$response")"

          echo "has_wiki=${has_wiki}" >> "$GITHUB_OUTPUT"

          if [ "$has_wiki" != "true" ]; then
            {
              echo "## GitHub Wiki publication"
              echo ""
              echo "Skipped publish because this repository does not currently expose GitHub Wiki."
              echo "The versioned source of truth remains \`docs/wiki\` in the main repository."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish GitHub Wiki
        if: steps.commit_docs.outputs.changed == 'true' && steps.wiki_meta.outputs.has_wiki == 'true'
        env:
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          wiki_dir="$(mktemp -d)"
          wiki_url="https://x-access-token:${WIKI_PUSH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone "$wiki_url" "$wiki_dir"

          find "$wiki_dir" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R docs/wiki/. "$wiki_dir/"

          cd "$wiki_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            exit 0
          fi

          git add .
          git commit -m "Update wiki after PR #${{ github.event.pull_request.number }}"
          git push
